version: '3.8'
services:
  api-gateway:
    build: ./APIGateway
    ports:
      - "8080:8080"
    depends_on:
      - gone-ws
      - comments-service
  
  gone-ws:
    build: ./GONEWS
    ports:
      - "8082:8082"
  
  comments-service:
    build: ./comments-service
    ports:
      - "8081:8081"
